<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorting Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sorting Visualizer</h1>

<div id="array-container"></div>

<div class="controls">
  <button onclick="generateArray()">Generate</button>

  <button onclick="bubbleSort()">Bubble</button>
  <button onclick="selectionSort()">Selection</button>
  <button onclick="insertionSort()">Insertion</button>

  <button onclick="prevStep()">⬅ Prev</button>
  <button onclick="nextStep()">Next ➡</button>

  <button onclick="play()">▶ Play</button>

  <label>Speed</label>
  <input type="range" id="speed" min="50" max="1000" value="300">
</div>

<script src="script.js"></script>

</body>
</html>
